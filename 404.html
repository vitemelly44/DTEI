<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      var path = window.location.pathname.substr(1);
      var segments = path.split('/');
      var pathSegmentsToKeep = 1;
      var basePath = '/' + segments.slice(0, pathSegmentsToKeep).join('/') + '/';
      var redirectPath = segments.slice(pathSegmentsToKeep).join('/');

      if (redirectPath) {
        redirectPath = '/' + redirectPath + window.location.search + window.location.hash;
      } else {
        redirectPath = '/';
      }

      window.location.replace(basePath + '?p=' + encodeURIComponent(redirectPath));
    </script>
  </head>
  <body></body>
</html>
